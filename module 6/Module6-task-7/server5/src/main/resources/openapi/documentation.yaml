openapi: 3.0.3
info:
  title: Module6 Nobel Prize API
  version: 1.0.0
servers:
  - url: http://localhost:8081
paths:
  /login:
    post:
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: JWT token
  /prizes:
    get:
      summary: Get all prizes
      parameters:
        - in: query
          name: year
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: Prize list
  /prizes/{year}/{category}:
    get:
      summary: Get prize by year and category
      parameters:
        - in: path
          name: year
          required: true
          schema:
            type: string
        - in: path
          name: category
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prize details
  /prizes/{year}/{category}/laureates:
    get:
      summary: Get laureates by prize
      parameters:
        - in: path
          name: year
          required: true
          schema:
            type: string
        - in: path
          name: category
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Laureates list
  /laureates/{id}:
    get:
      summary: Get laureate detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Laureate detail
  /users/me:
    get:
      summary: Get current profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile info
  /users/me/prizes:
    get:
      summary: Get favorite prizes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Favorite prizes
  /users/me/prizes/{prizeId}:
    post:
      summary: Add prize to favorites
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: prizeId
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Added
    delete:
      summary: Remove prize from favorites
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: prizeId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Removed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
